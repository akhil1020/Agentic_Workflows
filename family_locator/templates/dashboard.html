
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Locator Dashboard</title>

  <!-- Leaflet map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #334155;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    header p  { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 12px;
    }
    #refresh-indicator {
      font-size: 0.75rem; color: #64748b;
      display: flex; align-items: center; gap: 6px;
    }
    #refresh-indicator .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    #last-updated { font-size: 0.75rem; color: #475569; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      min-height: 0;
      height: calc(100vh - 74px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #334155;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h2 { font-size: 0.9rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    #device-count {
      background: #6366f1;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }

    #device-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #device-list::-webkit-scrollbar { width: 6px; }
    #device-list::-webkit-scrollbar-track { background: transparent; }
    #device-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .device-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .device-card:hover  { border-color: #6366f1; background: #1a2540; }
    .device-card.active { border-color: #6366f1; background: #1a2540; box-shadow: 0 0 0 1px #6366f1; }

    .device-card-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .device-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .device-name { font-weight: 600; font-size: 0.9rem; color: #f1f5f9; }
    .device-id   { font-size: 0.72rem; color: #64748b; margin-top: 2px; font-family: monospace; }

    .device-status {
      margin-left: auto;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    }
    .status-badge {
      font-size: 0.68rem; font-weight: 600;
      padding: 2px 8px; border-radius: 999px;
    }
    .status-badge.online  { background: #14532d; color: #4ade80; }
    .status-badge.offline { background: #7f1d1d; color: #f87171; }
    .status-badge.stale   { background: #78350f; color: #fbbf24; }

    .device-meta {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .meta-value { font-size: 0.8rem; color: #cbd5e1; font-family: monospace; }

    .battery-bar {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
    }
    .battery-bar-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .battery-track {
      flex: 1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden;
    }
    .battery-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.4s;
    }
    .battery-pct { font-size: 0.75rem; font-weight: 600; font-family: monospace; }

    /* ── Map ── */
    #map { width: 100%; height: 100%; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 12px !important;
      color: #e2e8f0 !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: #1e293b !important; }
    .popup-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .popup-row { display: flex; justify-content: space-between; gap: 16px; font-size: 0.8rem; margin-bottom: 4px; }
    .popup-row span:first-child { color: #64748b; }
    .popup-row span:last-child  { color: #cbd5e1; font-family: monospace; }

    /* ── No devices ── */
    .no-devices {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center; color: #475569;
    }
    .no-devices .icon { font-size: 48px; margin-bottom: 12px; }
    .no-devices h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: #64748b; }
    .no-devices p  { font-size: 0.8rem; line-height: 1.5; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 12px 18px;
      font-size: 0.85rem; color: #e2e8f0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">📍</div>
  <div>
    <h1>Family Locator</h1>
    <p>Real-time location dashboard</p>
  </div>
  <div class="header-right">
    <div id="refresh-indicator"><div class="dot"></div> Live — refreshing every 10s</div>
    <div id="last-updated">—</div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Devices</h2>
      <span id="device-count">0</span>
    </div>
    <div id="device-list">
      <div class="no-devices">
        <div class="icon">📡</div>
        <h3>Waiting for devices…</h3>
        <p>Start sharing location on the Android app.<br>Data will appear here automatically.</p>
      </div>
    </div>
  </aside>

  <!-- Map -->
  <main>
    <div id="map"></div>
  </main>
</div>

<div id="toast"></div>

<script>
  // ── Map setup ──────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20
  }).addTo(map);

  // ── State ─────────────────────────────────────────────────────────────
  const markers  = {};   // device_id → L.marker
  const polylines = {};  // device_id → L.polyline  (trail)
  let   activeId = null;

  // colour palette for devices
  const COLOURS = ['#6366f1','#22c55e','#f59e0b','#ec4899','#14b8a6','#f97316'];
  const deviceColour = {};
  let   colourIdx = 0;
  function colourFor(id) {
    if (!deviceColour[id]) deviceColour[id] = COLOURS[colourIdx++ % COLOURS.length];
    return deviceColour[id];
  }

  function makeIcon(colour, isActive) {
    const size = isActive ? 20 : 16;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size*2}" height="${size*2}" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="14" fill="${colour}" fill-opacity="0.25"/>
      <circle cx="20" cy="20" r="9"  fill="${colour}"/>
      <circle cx="20" cy="20" r="4"  fill="#fff"/>
    </svg>`;
    return L.divIcon({
      html: svg,
      className: '',
      iconSize:   [size*2, size*2],
      iconAnchor: [size, size],
      popupAnchor:[0, -size]
    });
  }

  // ── Popup HTML ─────────────────────────────────────────────────────────
  function buildPopup(d) {
    const ago = formatAgo(d.timestamp);
    return `<div class="popup-title">📱 ${d.device_name}</div>
      <div class="popup-row"><span>Device ID</span><span>${d.device_id}</span></div>
      <div class="popup-row"><span>Latitude</span><span>${d.latitude.toFixed(6)}</span></div>
      <div class="popup-row"><span>Longitude</span><span>${d.longitude.toFixed(6)}</span></div>
      <div class="popup-row"><span>Battery</span><span>${d.battery_percentage}%</span></div>
      <div class="popup-row"><span>Last seen</span><span>${ago}</span></div>`;
  }

  // ── Utils ──────────────────────────────────────────────────────────────
  function formatAgo(unixSec) {
    const diff = Math.floor(Date.now()/1000) - unixSec;
    if (diff <  60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  function onlineStatus(unixSec) {
    const diff = Math.floor(Date.now()/1000) - unixSec;
    if (diff <  60) return 'online';
    if (diff < 300) return 'stale';
    return 'offline';
  }

  function batteryColour(pct) {
    if (pct >= 50) return '#22c55e';
    if (pct >= 20) return '#f59e0b';
    return '#ef4444';
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Render sidebar card ────────────────────────────────────────────────
  function renderCard(d) {
    const status = onlineStatus(d.timestamp);
    const colour = colourFor(d.device_id);
    const bColour = batteryColour(d.battery_percentage);

    const card = document.createElement('div');
    card.className = 'device-card' + (activeId === d.device_id ? ' active' : '');
    card.dataset.id = d.device_id;
    card.innerHTML = `
      <div class="device-card-top">
        <div class="device-icon">📱</div>
        <div>
          <div class="device-name">${d.device_name}</div>
          <div class="device-id">${d.device_id}</div>
        </div>
        <div class="device-status">
          <span class="status-badge ${status}">${status.toUpperCase()}</span>
        </div>
      </div>
      <div class="device-meta">
        <div class="meta-item">
          <span class="meta-label">Latitude</span>
          <span class="meta-value">${d.latitude.toFixed(5)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Longitude</span>
          <span class="meta-value">${d.longitude.toFixed(5)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Last Seen</span>
          <span class="meta-value">${formatAgo(d.timestamp)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Synced</span>
          <span class="meta-value">${formatAgo(d.received_at)}</span>
        </div>
      </div>
      <div class="battery-bar">
        <span class="battery-bar-label">Battery</span>
        <div class="battery-track">
          <div class="battery-fill" style="width:${d.battery_percentage}%;background:${bColour}"></div>
        </div>
        <span class="battery-pct" style="color:${bColour}">${d.battery_percentage}%</span>
      </div>`;

    card.addEventListener('click', () => focusDevice(d));
    return card;
  }

  // ── Focus a device on map ──────────────────────────────────────────────
  function focusDevice(d) {
    activeId = d.device_id;
    document.querySelectorAll('.device-card').forEach(c => {
      c.classList.toggle('active', c.dataset.id === d.device_id);
    });
    const m = markers[d.device_id];
    if (m) {
      map.setView(m.getLatLng(), 15, { animate: true });
      m.openPopup();
    }
    // load trail
    fetchTrail(d.device_id);
  }

  async function fetchTrail(deviceId) {
    try {
      const r = await fetch(`/api/devices/${deviceId}/history?limit=100`);
      const pts = await r.json();
      if (polylines[deviceId]) polylines[deviceId].remove();
      const lls = pts.map(p => [p.latitude, p.longitude]);
      polylines[deviceId] = L.polyline(lls, {
        color: colourFor(deviceId),
        weight: 2,
        opacity: 0.6,
        dashArray: '4 6'
      }).addTo(map);
    } catch (_) {}
  }

  // ── Main refresh loop ──────────────────────────────────────────────────
  let knownIds = new Set();

  async function refresh() {
    try {
      const res = await fetch('/api/devices');
      const devices = await res.json();

      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
      document.getElementById('device-count').textContent = devices.length;

      // Detect new devices
      devices.forEach(d => {
        if (!knownIds.has(d.device_id)) {
          knownIds.add(d.device_id);
          if (knownIds.size > 1) showToast(`New device: ${d.device_name} (${d.device_id})`);
        }
      });

      // Update sidebar
      const list = document.getElementById('device-list');
      if (devices.length === 0) {
        list.innerHTML = `<div class="no-devices">
          <div class="icon">📡</div>
          <h3>Waiting for devices…</h3>
          <p>Start sharing location on the Android app.<br>Data will appear here automatically.</p>
        </div>`;
      } else {
        list.innerHTML = '';
        devices.forEach(d => list.appendChild(renderCard(d)));
      }

      // Update markers
      const seen = new Set();
      devices.forEach(d => {
        seen.add(d.device_id);
        const colour = colourFor(d.device_id);
        const latlng = [d.latitude, d.longitude];
        const isActive = activeId === d.device_id;

        if (markers[d.device_id]) {
          markers[d.device_id].setLatLng(latlng)
                               .setIcon(makeIcon(colour, isActive))
                               .setPopupContent(buildPopup(d));
        } else {
          markers[d.device_id] = L.marker(latlng, { icon: makeIcon(colour, isActive) })
            .bindPopup(buildPopup(d), { maxWidth: 280 })
            .addTo(map);
          markers[d.device_id].on('click', () => focusDevice(d));
        }
      });

      // Remove markers for devices no longer in list
      Object.keys(markers).forEach(id => {
        if (!seen.has(id)) { markers[id].remove(); delete markers[id]; }
      });

      // Fit map to all markers on first load
      if (devices.length > 0 && knownIds.size === devices.length) {
        const group = L.featureGroup(Object.values(markers));
        map.fitBounds(group.getBounds().pad(0.3));
      }

      // Refresh active trail
      if (activeId) fetchTrail(activeId);

    } catch (err) {
      console.error('Refresh error:', err);
    }
  }

  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
